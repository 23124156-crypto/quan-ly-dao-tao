<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản lý Đồ án</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hidden { display: none; }
        body { background-color: #f8f9fa; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">Portal Đào Tạo</a>
        <div id="user-info" class="text-white"></div>
    </div>
</nav>

<div class="container">
    <div id="login-section" class="card shadow p-4 mx-auto" style="max-width: 400px;">
        <h3 class="text-center">Đăng nhập</h3>
        <div class="mb-3">
            <label>Mã số (User)</label>
            <input type="text" id="username" class="form-control" placeholder="SV01 hoặc GV01">
        </div>
        <div class="mb-3">
            <label>Mật khẩu</label>
            <input type="password" id="password" class="form-control" value="123">
        </div>
        <button onclick="handleLogin()" class="btn btn-primary w-100">Đăng nhập</button>
        <p class="mt-2 small text-muted text-center">Gợi ý: SV01 (Sinh viên), GV01 (Giảng viên)</p>
    </div>

    <div id="student-section" class="hidden">
        <h2>Khu vực Sinh viên</h2>
        <div class="row">
            <div class="col-md-4">
                <div class="list-group">
                    <button class="list-group-item list-group-item-action active">Thông tin chung</button>
                    <button class="list-group-item list-group-item-action">Đăng ký đề tài BCTT</button>
                    <button class="list-group-item list-group-item-action">Theo dõi trạng thái</button>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card p-3">
                    <h4>Đăng ký Báo cáo thực tập</h4>
                    <input type="text" class="form-control mb-2" placeholder="Tên đề tài">
                    <select class="form-select mb-2">
                        <option>Chọn lĩnh vực...</option>
                        <option>Phát triển Web</option>
                        <option>AI & Data</option>
                    </select>
                    <button class="btn btn-success">Gửi đăng ký</button>
                </div>
            </div>
        </div>
    </div>

    <div id="teacher-section" class="hidden">
        <h2>Khu vực Giảng viên</h2>
        <table class="table table-bordered bg-white shadow-sm">
            <thead class="table-dark">
                <tr>
                    <th>MSSV</th>
                    <th>Họ tên</th>
                    <th>Đề tài</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>SV001</td>
                    <td>Nguyễn Văn A</td>
                    <td>Web quản lý bán hàng</td>
                    <td>
                        <button class="btn btn-sm btn-success">Duyệt</button>
                        <button class="btn btn-sm btn-danger">Từ chối</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    function handleLogin() {
        const user = document.getElementById('username').value.toUpperCase();
        const loginSection = document.getElementById('login-section');
        const studentSection = document.getElementById('student-section');
        const teacherSection = document.getElementById('teacher-section');
        const userInfo = document.getElementById('user-info');

        if (user.startsWith('SV')) {
            loginSection.classList.add('hidden');
            studentSection.classList.remove('hidden');
            userInfo.innerText = "Xin chào Sinh viên: " + user;
        } else if (user.startsWith('GV')) {
            loginSection.classList.add('hidden');
            teacherSection.classList.remove('hidden');
            userInfo.innerText = "Xin chào Giảng viên: " + user;
        } else {
            alert("Sai tài khoản! Thử lại với SV01 hoặc GV01");
        }
    }
</script>

</body>
</html>
